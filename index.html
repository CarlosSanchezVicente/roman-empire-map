<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset='utf-8' />
    <title>La Expansión de Roma</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <link rel="icon" type="image/x-icon"
        href="https://raw.githubusercontent.com/mapbox/assembly/publisher-staging/src/svgs/mapbox.svg">

    <!-- Mapbox GL JS -->
    <script src='https://api.tiles.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.js'></script>
    <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.css' rel='stylesheet' />

    <!-- Globe Minimap & Scrollama -->
    <script src="https://cdn.jsdelivr.net/npm/mapbox-gl-globe-minimap@1.2.0/dist/bundle.js"></script>
    <script src="https://unpkg.com/scrollama"></script>

    <!-- Roman Typefaces -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    <style>
        /* ═══════════════════════════════════════════════
           DESIGN TOKENS — Imperial Palette
        ═══════════════════════════════════════════════ */
        :root {
            --obsidian:    #080604;
            --stone-deep:  #12100d;
            --stone-mid:   #1e1a14;
            --stone-light: #2e2820;
            --parchment:   #e8d5a3;
            --parchment-dim: #c4b080;
            --gold:        #c9a84c;
            --gold-bright: #e2c46a;
            --crimson:     #7a1515;
            --crimson-mid: #a01c1c;
            --crimson-glow:rgba(122,21,21,0.35);
            --marble:      #f0ece4;
            --text-body:   #d4c4a0;
            --text-dim:    #8a7a5e;
            --border:      rgba(201,168,76,0.25);
            --panel-bg:    rgba(10, 8, 5, 0.88);

            --font-display: 'Cinzel', serif;
            --font-body:    'EB Garamond', serif;

            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --transition: 0.6s var(--ease-out);
        }

        /* ═══════════════════════════════════════════════
           RESET & BASE
        ═══════════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background: var(--obsidian);
            color: var(--text-body);
            font-size: 16px;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        a, a:visited { color: var(--gold); text-decoration: none; border-bottom: 1px solid var(--border); transition: color 0.3s, border-color 0.3s; }
        a:hover { color: var(--gold-bright); border-color: var(--gold-bright); }

        /* ═══════════════════════════════════════════════
           MAP CONTAINER
        ═══════════════════════════════════════════════ */
        #map {
            top: 0;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* Cinematic left-edge gradient vignette for panel depth */
        #map::after {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(
                to right,
                rgba(8,6,4,0.72) 0%,
                rgba(8,6,4,0.30) 38%,
                transparent 60%
            );
            pointer-events: none;
            z-index: 1;
        }

        /* ═══════════════════════════════════════════════
           STORY WRAPPER
        ═══════════════════════════════════════════════ */
        #story { position: relative; z-index: 5; }

        /* ═══════════════════════════════════════════════
           HEADER — Cinematic Title Card
        ═══════════════════════════════════════════════ */
        #header {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10vh 10vw;
            text-align: center;
            background:
                radial-gradient(ellipse 80% 60% at 50% 50%, rgba(122,21,21,0.18) 0%, transparent 70%),
                linear-gradient(to bottom, rgba(8,6,4,0.95) 0%, rgba(8,6,4,0.55) 50%, rgba(8,6,4,0.95) 100%);
            overflow: hidden;
        }

        /* Decorative horizontal rules flanking the title */
        #header::before,
        #header::after {
            content: '';
            display: block;
            width: 120px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 1.5rem auto;
        }

        #header h1 {
            font-family: var(--font-display);
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--marble);
            text-shadow: 0 2px 40px rgba(201,168,76,0.35), 0 0 80px rgba(122,21,21,0.2);
            line-height: 1.15;
            margin-bottom: 1.2rem;
            animation: fadeRise 1.4s var(--ease-out) both;
        }

        #header h2 {
            font-family: var(--font-body);
            font-size: clamp(1.2rem, 2.2vw, 1.6rem);
            font-weight: 400;
            font-style: italic;
            color: var(--parchment-dim);
            letter-spacing: 0.04em;
            max-width: 560px;
            line-height: 1.6;
            animation: fadeRise 1.4s 0.3s var(--ease-out) both;
        }

        /* Decorative Roman ornament between title and subtitle */
        .header-ornament {
            display: block;
            font-family: var(--font-display);
            font-size: 1.4rem;
            color: var(--gold);
            letter-spacing: 0.3em;
            margin: 0.8rem 0;
            animation: fadeRise 1.4s 0.15s var(--ease-out) both;
        }

        /* Scroll cue at bottom of header */
        .scroll-cue {
            position: absolute;
            bottom: 5vh;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            animation: fadeRise 2s 1.2s var(--ease-out) both;
        }

        .scroll-cue span {
            font-family: var(--font-display);
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .scroll-cue .arrow {
            width: 1px;
            height: 42px;
            background: linear-gradient(to bottom, var(--gold), transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }

        /* ═══════════════════════════════════════════════
           CHAPTER STEPS
        ═══════════════════════════════════════════════ */
        #features {
            padding-top: 12vh;
            padding-bottom: 15vh;
        }

        .step {
            padding-bottom: 52vh;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity var(--transition), transform var(--transition);
            will-change: opacity, transform;
        }

        .step.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Chapter panel */
        .step > div {
            position: relative;
            padding: 0;
            border-radius: 2px;
            overflow: hidden;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.6),
                0 8px 40px rgba(0,0,0,0.6),
                inset 0 0 60px rgba(8,6,4,0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Gold left accent bar */
        .step > div::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, transparent, var(--gold), var(--crimson), transparent);
        }

        /* Inner padding container */
        .step-inner {
            padding: 28px 32px 28px 36px;
        }

        /* Chapter date/title */
        .step > div h3 {
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 0.6rem;
            padding: 28px 32px 0 36px;
        }

        /* Title separator */
        .step > div h3::after {
            content: '';
            display: block;
            width: 40px;
            height: 1px;
            background: var(--crimson-mid);
            margin-top: 8px;
        }

        /* Body text */
        .step > div p {
            font-family: var(--font-body);
            font-size: 1.15rem;
            line-height: 1.75;
            color: var(--text-body);
            padding: 0 32px 20px 36px;
        }

        .step > div p + p { margin-top: 0.6rem; }

        /* ═══════════════════════════════════════════════
           MEDIA — Images & Captions
        ═══════════════════════════════════════════════ */
        .media-container {
            margin: 4px 0 0;
            position: relative;
        }

        .story-img {
            width: 100%;
            height: auto;
            display: block;
            filter: sepia(0.15) contrast(1.05);
            transition: filter 0.5s ease;
        }

        .step.active .story-img { filter: sepia(0) contrast(1.05); }

        .image-caption {
            width: 100%;
            font-family: var(--font-body);
            font-size: 0.78rem;
            font-style: italic;
            color: var(--text-dim);
            text-align: right;
            line-height: 1.4;
            padding: 6px 32px 22px 36px;
            background: rgba(8,6,4,0.5);
            border-top: 1px solid rgba(201,168,76,0.1);
        }

        /* ═══════════════════════════════════════════════
           ALIGNMENT UTILITIES
        ═══════════════════════════════════════════════ */
        .hidden   { visibility: hidden; }
        .centered { width: 48vw; margin: 0 auto; }
        .lefty    { width: 32vw; margin-left: 5vw; }
        .righty   { width: 32vw; margin-left: 63vw; }
        .fully    { width: 100%; margin: auto; }

        /* ═══════════════════════════════════════════════
           LEGEND — Simbología Romana
        ═══════════════════════════════════════════════ */
        #legend {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 16px 18px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5), inset 0 0 30px rgba(8,6,4,0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 210px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s var(--ease-out);
        }

        #legend.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #legend h4 {
            font-family: var(--font-display);
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        #legend > div {
            display: flex;
            align-items: center;
            margin-bottom: 9px;
            font-family: var(--font-body);
            font-size: 0.98rem;
            color: var(--text-body);
        }

        .leg-color { width: 16px; height: 16px; margin-right: 10px; border-radius: 2px; flex-shrink: 0; }
        .expansion { background-color: rgba(122, 27, 27, 0.55); border: 1px solid rgba(201,168,76,0.3); }
        .road      { background-color: #8b4513; height: 3px; }
        .leg-point { width: 10px; height: 10px; margin-right: 14px; border-radius: 50%; flex-shrink: 0; }
        .capital   { background-color: #a67c00; border: 2px solid #ffffff; }
        .city      { background-color: #ecc904; border: 2px solid #000000; }
        .leg-line  { width: 16px; height: 3px; margin-right: 10px; background-color: #2d0101; flex-shrink: 0; }

        /* ═══════════════════════════════════════════════
           FOOTER
        ═══════════════════════════════════════════════ */
        #footer {
            width: 100%;
            padding: 3.5vh 5vw;
            text-align: center;
            font-family: var(--font-body);
            font-size: 0.82rem;
            font-style: italic;
            color: var(--text-dim);
            background: var(--stone-deep);
            border-top: 1px solid var(--border);
            position: relative;
            z-index: 5;
            line-height: 1.8;
        }

        /* ═══════════════════════════════════════════════
           MAPBOX OVERRIDES — Navigation Controls
        ═══════════════════════════════════════════════ */
        .mapboxgl-ctrl-group {
            background: var(--panel-bg) !important;
            border: 1px solid var(--border) !important;
            border-radius: 2px !important;
            backdrop-filter: blur(10px);
        }

        .mapboxgl-ctrl-group button {
            color: var(--parchment) !important;
        }

        .mapboxgl-ctrl-group button:hover { background: var(--stone-light) !important; }

        /* ═══════════════════════════════════════════════
           ANIMATIONS
        ═══════════════════════════════════════════════ */
        @keyframes fadeRise {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 0.4; transform: scaleY(1); }
            50%       { opacity: 1;   transform: scaleY(1.15); }
        }

        /* ═══════════════════════════════════════════════
           MOBILE
        ═══════════════════════════════════════════════ */
        @media (max-width: 750px) {
            #map::after { display: none; }

            .centered, .lefty, .righty, .fully {
                width: 92vw;
                margin: 0 auto;
            }

            #header h1 { font-size: clamp(1.6rem, 7vw, 2.5rem); }
            #header h2 { font-size: 1rem; }

            .step > div h3,
            .step > div p,
            .step-inner    { padding-left: 22px; padding-right: 20px; }

            .image-caption { padding-left: 22px; padding-right: 20px; }

            #legend { width: 175px; font-size: 0.78rem; }
        }

        /* Fix Mapbox touch-scroll on mobile */
        .mapboxgl-canvas-container.mapboxgl-touch-zoom-rotate.mapboxgl-touch-drag-pan,
        .mapboxgl-canvas-container.mapboxgl-touch-zoom-rotate.mapboxgl-touch-drag-pan .mapboxgl-canvas {
            touch-action: unset;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <!-- ── LEGEND ─────────────────────────────── -->
    <div id="legend" class="custom-legend">
        <h4>Simbología Romana</h4>
        <div><span class="leg-color expansion"></span> Expansión Territorial</div>
        <div><span class="leg-color road"></span> Calzadas Principales</div>
        <div><span class="leg-point capital"></span> Capital</div>
        <div><span class="leg-point city"></span> Ciudad/Asentamiento</div>
        <div><span class="leg-line fort"></span> Fortificaciones</div>
    </div>

    <div id="story"></div>

    <script src="./config.js"></script>
    <script>
        /* ── STATE ─────────────────────────────── */
        var initLoad = true;

        var layerTypes = {
            'fill':           ['fill-opacity'],
            'line':           ['line-opacity'],
            'circle':         ['circle-opacity', 'circle-stroke-opacity'],
            'symbol':         ['icon-opacity', 'text-opacity'],
            'raster':         ['raster-opacity'],
            'fill-extrusion': ['fill-extrusion-opacity'],
            'heatmap':        ['heatmap-opacity']
        };

        var alignments = {
            'left':   'lefty',
            'center': 'centered',
            'right':  'righty',
            'full':   'fully'
        };

        /* ── LAYER HELPERS ─────────────────────── */
        function getLayerPaintType(layer) {
            return layerTypes[map.getLayer(layer).type];
        }

        function setLayerOpacity(layer) {
            var paintProps = getLayerPaintType(layer.layer);
            paintProps.forEach(function (prop) {
                var options = {};
                if (layer.duration) {
                    map.setPaintProperty(layer.layer, prop + '-transition', { duration: layer.duration });
                    options = { duration: layer.duration };
                }
                map.setPaintProperty(layer.layer, prop, layer.opacity, options);
            });
        }

        /* ── BUILD DOM ─────────────────────────── */
        var story    = document.getElementById('story');
        var features = document.createElement('div');
        features.setAttribute('id', 'features');

        var header = document.createElement('div');

        if (config.title) {
            var titleText = document.createElement('h1');
            titleText.innerText = config.title;
            header.appendChild(titleText);
        }

        // Decorative ornament between title and subtitle
        var ornament = document.createElement('span');
        ornament.className = 'header-ornament';
        ornament.innerHTML = '&#10022; &nbsp; SPQR &nbsp; &#10022;';
        header.appendChild(ornament);

        if (config.subtitle) {
            var subtitleText = document.createElement('h2');
            subtitleText.innerText = config.subtitle;
            header.appendChild(subtitleText);
        }

        if (config.byline) {
            var bylineText = document.createElement('p');
            bylineText.innerText = config.byline;
            header.appendChild(bylineText);
        }

        // Scroll cue
        var scrollCue = document.createElement('div');
        scrollCue.className = 'scroll-cue';
        scrollCue.innerHTML = '<span>Desplaza para explorar</span><div class="arrow"></div>';
        header.appendChild(scrollCue);

        if (header.innerText.length > 0) {
            header.classList.add(config.theme);
            header.setAttribute('id', 'header');
            story.appendChild(header);
        }

        /* ── BUILD CHAPTERS ────────────────────── */
        config.chapters.forEach((record, idx) => {
            var container = document.createElement('div');
            var chapter   = document.createElement('div');

            if (record.title) {
                var title = document.createElement('h3');
                title.innerText = record.title;
                chapter.appendChild(title);
            }

            // Inner padding wrapper
            var inner = document.createElement('div');
            inner.className = 'step-inner';

            if (record.image) {
                var image = new Image();
                image.src = record.image;
                image.className = 'story-img';
                inner.appendChild(image);
            }

            if (record.description) {
                var desc = document.createElement('div');
                desc.innerHTML = record.description;
                inner.appendChild(desc);
            }

            chapter.appendChild(inner);

            container.setAttribute('id', record.id);
            container.classList.add('step');
            if (idx === 0) container.classList.add('active');

            chapter.classList.add(config.theme);
            container.appendChild(chapter);
            container.classList.add(alignments[record.alignment] || 'centered');
            if (record.hidden) container.classList.add('hidden');

            features.appendChild(container);
        });

        story.appendChild(features);

        /* ── BUILD FOOTER ──────────────────────── */
        var footer = document.createElement('div');
        if (config.footer) {
            var footerText = document.createElement('p');
            footerText.innerHTML = config.footer;
            footer.appendChild(footerText);
        }
        if (footer.innerText.length > 0) {
            footer.classList.add(config.theme);
            footer.setAttribute('id', 'footer');
            story.appendChild(footer);
        }

        /* ── MAP INIT ──────────────────────────── */
        mapboxgl.accessToken = config.accessToken;

        var map = new mapboxgl.Map({
            container:   'map',
            style:       config.style,
            center:      config.chapters[0].location.center,
            zoom:        config.chapters[0].location.zoom,
            bearing:     config.chapters[0].location.bearing,
            pitch:       config.chapters[0].location.pitch,
            interactive: true,      // ← permite usar los controles del mapa
            scrollZoom:  false,     // ← el scroll de página NO hará zoom
            dragPan:     false,     // ← el usuario no puede arrastrar el mapa
            dragRotate:  false,     // ← evita rotación manual accidental
            projection:  config.projection,

            // ── CONFIGURACIÓN MAPBOX STANDARD ──────────────
            config: {
                basemap: {
                    showAdminBoundaries: false,  // Oculta límites administrativos
                    colorMotorways:      '#00000000', // Autopistas → transparente
                    colorTrunks:         '#00000000'  // Carreteras troncales → transparente
                }
            }
            // ───────────────────────────────────────────────
        });

        if (config.showMarkers) {
            var marker = new mapboxgl.Marker({ color: config.markerColor });
            marker.setLngLat(config.chapters[0].location.center).addTo(map);
        }

        /* ── SCROLLAMA ─────────────────────────── */
        var scroller = scrollama();

        map.on('load', function () {

            // ── REFUERZO: OCULTAR CAPAS MAPBOX STANDARD ────
            map.setConfigProperty('basemap', 'showAdminBoundaries', false);
            map.setConfigProperty('basemap', 'colorMotorways',      '#00000000');
            map.setConfigProperty('basemap', 'colorTrunks',         '#00000000');
            // ───────────────────────────────────────────────

            if (config.use3dTerrain) {
                map.addSource('mapbox-dem', {
                    type:     'raster-dem',
                    url:      'mapbox://mapbox.mapbox-terrain-dem-v1',
                    tileSize: 512,
                    maxzoom:  14
                });
                map.setTerrain({ source: 'mapbox-dem', exaggeration: 1.5 });
                map.addLayer({
                    id:   'sky',
                    type: 'sky',
                    paint: {
                        'sky-type':                   'atmosphere',
                        'sky-atmosphere-sun':          [0.0, 0.0],
                        'sky-atmosphere-sun-intensity': 15
                    }
                });
            }

            scroller
                .setup({ step: '.step', offset: 0.5, progress: true })
                .onStepEnter(async response => {
                    var current_chapter = config.chapters.findIndex(chap => chap.id === response.element.id);
                    var chapter = config.chapters[current_chapter];

                    response.element.classList.add('active');
                    map[chapter.mapAnimation || 'flyTo'](chapter.location);

                    // Muestra la leyenda al entrar en el primer capítulo
                    if (current_chapter === 0) {
                        document.getElementById('legend').classList.add('visible');
                    }

                    if (config.showMarkers) marker.setLngLat(chapter.location.center);

                    if (chapter.onChapterEnter.length > 0) {
                        chapter.onChapterEnter.forEach(setLayerOpacity);
                    }
                    if (chapter.callback) window[chapter.callback]();

                    if (chapter.rotateAnimation) {
                        map.once('moveend', () => {
                            const rotateNumber = map.getBearing();
                            map.rotateTo(rotateNumber + 180, {
                                duration: 30000,
                                easing: t => t
                            });
                        });
                    }
                    if (config.auto) {
                        var next_chapter = (current_chapter + 1) % config.chapters.length;
                        map.once('moveend', () => {
                            document.querySelectorAll('[data-scrollama-index="' + next_chapter + '"]')[0].scrollIntoView();
                        });
                    }
                })
                .onStepExit(response => {
                    var chapter = config.chapters.find(chap => chap.id === response.element.id);
                    response.element.classList.remove('active');
                    if (chapter.onChapterExit.length > 0) {
                        chapter.onChapterExit.forEach(setLayerOpacity);
                    }
                });

            if (config.auto) {
                document.querySelectorAll('[data-scrollama-index="0"]')[0].scrollIntoView();
            }
        });
    </script>

</body>
</html>
